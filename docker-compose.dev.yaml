# Local Postgres for development.
#   docker compose -f docker-compose.dev.yaml up -d
#   docker compose -f docker-compose.dev.yaml down        # stop (keeps data)
#   docker compose -f docker-compose.dev.yaml down -v     # stop + wipe data
services:
  db:
    image: postgres:17-alpine
    container_name: creative-studio-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: creative_studio
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d creative_studio"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
